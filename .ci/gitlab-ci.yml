# ----------------------------------------------------------------------------
# default
# ----------------------------------------------------------------------------

default:
  image: debian:stable

# ----------------------------------------------------------------------------
# stages
# ----------------------------------------------------------------------------

stages:
  - build

# ----------------------------------------------------------------------------
# build_amd64
# ----------------------------------------------------------------------------

build_amd64:
  stage: build
  tags:
    - docker
    - amd64
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "release"
  before_script:
    - ./.ci/ci-setup-debian.sh
  script:
    - make clean && make -j$(nproc)

# ----------------------------------------------------------------------------
# build_arm64
# ----------------------------------------------------------------------------

build_arm64:
  stage: build
  tags:
    - docker
    - arm64
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "release"
  before_script:
    - ./.ci/ci-setup-debian.sh
  script:
    - make clean && make -j$(nproc)

# ----------------------------------------------------------------------------
# End-Of-File
# ----------------------------------------------------------------------------
